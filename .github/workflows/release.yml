name: release
'on':
  schedule:
  - cron: 0 13 * * *
  create:
    tags:
    - v*.*.*
    - nightly
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref
    }}
  cancel-in-progress: true
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - name: Ensure workspace ownership
      run: echo "chown -R ${USER} ${GITHUB_WORKSPACE}" && sudo chown -R ${USER} ${GITHUB_WORKSPACE}
    - name: Check out code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
        fetch-tags: true
    - name: Prepare release body
      run: "if [[ ${GITHUB_EVENT_NAME} == \"create\" ]]; then\n  RELEASE_TAG=${GITHUB_REF#refs/tags/}\n\
        \  if [[ ${RELEASE_TAG} == \"nightly\" ]]; then\n    PRERELEASE=true\n  else\n\
        \    PRERELEASE=false\n  fi\n  echo \"Workflow triggered by create tag: ${RELEASE_TAG}\"\
        \nelse\n  RELEASE_TAG=nightly\n  PRERELEASE=true\n  echo \"Workflow triggered\
        \ by schedule\"\nfi\necho \"RELEASE_TAG=${RELEASE_TAG}\" >> ${GITHUB_ENV}\n\
        echo \"PRERELEASE=${PRERELEASE}\" >> ${GITHUB_ENV}\nRELEASE_DATETIME=$(date\
        \ --rfc-3339=seconds)\necho Release ${RELEASE_TAG} created from ${GITHUB_SHA}\
        \ at ${RELEASE_DATETIME} > release_body.md\n"
    - name: Move the existing mutable tag
      run: "git fetch --tags\nif [[ ${GITHUB_EVENT_NAME} == \"schedule\" ]]; then\n\
        \  # Determine if a given tag exists and matches a specific Git commit.\n\
        \  # actions/checkout@v4 fetch-tags doesn't work when triggered by schedule\n\
        \  if [ \"$(git rev-parse -q --verify \"refs/tags/${RELEASE_TAG}\")\" = \"\
        ${GITHUB_SHA}\" ]; then\n    echo \"mutable tag ${RELEASE_TAG} exists and\
        \ matches ${GITHUB_SHA}\"\n  else\n    git tag -f ${RELEASE_TAG} ${GITHUB_SHA}\n\
        \    git push -f origin ${RELEASE_TAG}:refs/tags/${RELEASE_TAG}\n    echo\
        \ \"created/moved mutable tag ${RELEASE_TAG} to ${GITHUB_SHA}\"\n  fi\nfi\n"
    - name: Create or overwrite a release
      uses: softprops/action-gh-release@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        prerelease: ${{ env.PRERELEASE }}
        tag_name: ${{ env.RELEASE_TAG }}
        body_path: release_body.md
    - name: Build and push ragflow-sdk
      if: startsWith(github.ref, 'refs/tags/v')
      run: 'cd sdk/python && uv build && uv publish --token ${{ secrets.PYPI_API_TOKEN
        }}

        '
    - name: Build and push ragflow-cli
      if: startsWith(github.ref, 'refs/tags/v')
      run: 'cd admin/client && uv build && uv publish --token ${{ secrets.PYPI_API_TOKEN
        }}

        '
    - name: Build and push image
      run: 'sudo docker login --username infiniflow --password-stdin <<< ${{ secrets.DOCKERHUB_TOKEN
        }}

        sudo docker build --build-arg NEED_MIRROR=1 -t infiniflow/ragflow:${RELEASE_TAG}
        -f Dockerfile .

        sudo docker tag infiniflow/ragflow:${RELEASE_TAG} infiniflow/ragflow:latest

        sudo docker push infiniflow/ragflow:${RELEASE_TAG}

        sudo docker push infiniflow/ragflow:latest

        '
