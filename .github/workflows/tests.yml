name: tests
'on':
  push:
    branches:
    - main
    - '*.*.*'
    paths-ignore:
    - docs/**
    - '*.md'
    - '*.mdx'
  pull_request_target:
    types:
    - synchronize
    - ready_for_review
    paths-ignore:
    - docs/**
    - '*.md'
    - '*.mdx'
  schedule:
  - cron: 0 16 * * *
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref
    }}
  cancel-in-progress: true
jobs:
  ragflow_tests:
    name: ragflow_tests
    if: ${{ github.event_name != 'pull_request_target' || contains(github.event.pull_request.labels.*.name,
      'ci') }}
    runs-on: ubuntu-latest
    steps:
    - name: Ensure workspace ownership
      run: 'echo "Workflow triggered by ${{ github.event_name }}"

        echo "chown -R ${USER} ${GITHUB_WORKSPACE}" && sudo chown -R ${USER} ${GITHUB_WORKSPACE}

        '
    - name: Check out code
      uses: actions/checkout@v4
      with:
        ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target')
          && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha
          }}
        fetch-depth: 0
        fetch-tags: true
    - name: Check workflow duplication
      if: ${{ !cancelled() && !failure() }}
      run: "if [[ ${GITHUB_EVENT_NAME} != \"pull_request_target\" && ${GITHUB_EVENT_NAME}\
        \ != \"schedule\" ]]; then\n  HEAD=$(git rev-parse HEAD)\n  # Find a PR that\
        \ introduced a given commit\n  gh auth login --with-token <<< \"${{ secrets.GITHUB_TOKEN\
        \ }}\"\n  PR_NUMBER=$(gh pr list --search ${HEAD} --state merged --json number\
        \ --jq .[0].number)\n  echo \"HEAD=${HEAD}\"\n  echo \"PR_NUMBER=${PR_NUMBER}\"\
        \n  if [[ -n \"${PR_NUMBER}\" ]]; then\n    PR_SHA_FP=${RUNNER_WORKSPACE_PREFIX}/artifacts/${GITHUB_REPOSITORY}/PR_${PR_NUMBER}\n\
        \    if [[ -f \"${PR_SHA_FP}\" ]]; then\n      read -r PR_SHA PR_RUN_ID <\
        \ \"${PR_SHA_FP}\"\n      # Calculate the hash of the current workspace content\n\
        \      HEAD_SHA=$(git rev-parse HEAD^{tree})\n      if [[ \"${HEAD_SHA}\"\
        \ == \"${PR_SHA}\" ]]; then\n        echo \"Cancel myself since the workspace\
        \ content hash is the same with PR #${PR_NUMBER} merged. See ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${PR_RUN_ID}\
        \ for details.\"\n        gh run cancel ${GITHUB_RUN_ID}\n        while true;\
        \ do\n          status=$(gh run view ${GITHUB_RUN_ID} --json status -q .status)\n\
        \          [ \"${status}\" = \"completed\" ] && break\n          sleep 5\n\
        \        done\n        exit 1\n      fi\n    fi\n  fi\nelif [[ ${GITHUB_EVENT_NAME}\
        \ == \"pull_request_target\" ]]; then\n  PR_NUMBER=${{ github.event.pull_request.number\
        \ }}\n  PR_SHA_FP=${RUNNER_WORKSPACE_PREFIX}/artifacts/${GITHUB_REPOSITORY}/PR_${PR_NUMBER}\n\
        \  # Calculate the hash of the current workspace content\n  PR_SHA=$(git rev-parse\
        \ HEAD^{tree})\n  echo \"PR #${PR_NUMBER} workspace content hash: ${PR_SHA}\"\
        \n  mkdir -p ${RUNNER_WORKSPACE_PREFIX}/artifacts/${GITHUB_REPOSITORY}\n \
        \ echo \"${PR_SHA} ${GITHUB_RUN_ID}\" > ${PR_SHA_FP}\nfi\n"
    - name: Static check with Ruff
      uses: astral-sh/ruff-action@v3
      with:
        version: '>=0.11.x'
        args: check
    - name: Build ragflow:nightly
      run: "RUNNER_WORKSPACE_PREFIX=${RUNNER_WORKSPACE_PREFIX:-${HOME}}\nRAGFLOW_IMAGE=infiniflow/ragflow:${GITHUB_RUN_ID}\n\
        echo \"RAGFLOW_IMAGE=${RAGFLOW_IMAGE}\" >> ${GITHUB_ENV}\nsudo docker pull\
        \ ubuntu:22.04\nsudo DOCKER_BUILDKIT=1 docker build --build-arg NEED_MIRROR=1\
        \ -f Dockerfile -t ${RAGFLOW_IMAGE} .\nif [[ ${GITHUB_EVENT_NAME} == \"schedule\"\
        \ ]]; then\n  export HTTP_API_TEST_LEVEL=p3\nelse\n  export HTTP_API_TEST_LEVEL=p2\n\
        fi\necho \"HTTP_API_TEST_LEVEL=${HTTP_API_TEST_LEVEL}\" >> ${GITHUB_ENV}\n\
        echo \"RAGFLOW_CONTAINER=${GITHUB_RUN_ID}-ragflow-cpu-1\" >> ${GITHUB_ENV}\n"
    - name: Start ragflow:nightly
      run: '# Determine runner number (default to 1 if not found)

        RUNNER_NUM=$(sudo docker inspect $(hostname) --format ''{{index .Config.Labels
        "com.docker.compose.container-number"}}'' 2>/dev/null || true)

        RUNNER_NUM=${RUNNER_NUM:-1}


        # Compute port numbers using bash arithmetic

        ES_PORT=$((1200 + RUNNER_NUM * 10))

        OS_PORT=$((1201 + RUNNER_NUM * 10))

        INFINITY_THRIFT_PORT=$((23817 + RUNNER_NUM * 10))

        INFINITY_HTTP_PORT=$((23820 + RUNNER_NUM * 10))

        INFINITY_PSQL_PORT=$((5432 + RUNNER_NUM * 10))

        MYSQL_PORT=$((5455 + RUNNER_NUM * 10))

        MINIO_PORT=$((9000 + RUNNER_NUM * 10))

        MINIO_CONSOLE_PORT=$((9001 + RUNNER_NUM * 10))

        REDIS_PORT=$((6379 + RUNNER_NUM * 10))

        TEI_PORT=$((6380 + RUNNER_NUM * 10))

        KIBANA_PORT=$((6601 + RUNNER_NUM * 10))

        SVR_HTTP_PORT=$((9380 + RUNNER_NUM * 10))

        ADMIN_SVR_HTTP_PORT=$((9381 + RUNNER_NUM * 10))

        SVR_MCP_PORT=$((9382 + RUNNER_NUM * 10))

        SANDBOX_EXECUTOR_MANAGER_PORT=$((9385 + RUNNER_NUM * 10))

        SVR_WEB_HTTP_PORT=$((80 + RUNNER_NUM * 10))

        SVR_WEB_HTTPS_PORT=$((443 + RUNNER_NUM * 10))


        # Persist computed ports into docker/.env so docker-compose uses the correct
        host bindings

        echo "" >> docker/.env

        echo -e "ES_PORT=${ES_PORT}" >> docker/.env

        echo -e "OS_PORT=${OS_PORT}" >> docker/.env

        echo -e "INFINITY_THRIFT_PORT=${INFINITY_THRIFT_PORT}" >> docker/.env

        echo -e "INFINITY_HTTP_PORT=${INFINITY_HTTP_PORT}" >> docker/.env

        echo -e "INFINITY_PSQL_PORT=${INFINITY_PSQL_PORT}" >> docker/.env

        echo -e "MYSQL_PORT=${MYSQL_PORT}" >> docker/.env

        echo -e "MINIO_PORT=${MINIO_PORT}" >> docker/.env

        echo -e "MINIO_CONSOLE_PORT=${MINIO_CONSOLE_PORT}" >> docker/.env

        echo -e "REDIS_PORT=${REDIS_PORT}" >> docker/.env

        echo -e "TEI_PORT=${TEI_PORT}" >> docker/.env

        echo -e "KIBANA_PORT=${KIBANA_PORT}" >> docker/.env

        echo -e "SVR_HTTP_PORT=${SVR_HTTP_PORT}" >> docker/.env

        echo -e "ADMIN_SVR_HTTP_PORT=${ADMIN_SVR_HTTP_PORT}" >> docker/.env

        echo -e "SVR_MCP_PORT=${SVR_MCP_PORT}" >> docker/.env

        echo -e "SANDBOX_EXECUTOR_MANAGER_PORT=${SANDBOX_EXECUTOR_MANAGER_PORT}" >>
        docker/.env

        echo -e "SVR_WEB_HTTP_PORT=${SVR_WEB_HTTP_PORT}" >> docker/.env

        echo -e "SVR_WEB_HTTPS_PORT=${SVR_WEB_HTTPS_PORT}" >> docker/.env


        echo -e "COMPOSE_PROFILES=\${COMPOSE_PROFILES},tei-cpu" >> docker/.env

        echo -e "TEI_MODEL=BAAI/bge-small-en-v1.5" >> docker/.env

        echo -e "RAGFLOW_IMAGE=${RAGFLOW_IMAGE}" >> docker/.env

        echo "HOST_ADDRESS=http://host.docker.internal:${SVR_HTTP_PORT}" >> ${GITHUB_ENV}


        sudo docker compose -f docker/docker-compose.yml -p ${GITHUB_RUN_ID} up -d

        uv sync --python 3.10 --only-group test --no-default-groups --frozen && uv
        pip install sdk/python

        '
    - name: Run sdk tests against Elasticsearch
      run: "export http_proxy=\"\"; export https_proxy=\"\"; export no_proxy=\"\"\
        ; export HTTP_PROXY=\"\"; export HTTPS_PROXY=\"\"; export NO_PROXY=\"\"\n\
        until sudo docker exec ${RAGFLOW_CONTAINER} curl -s --connect-timeout 5 ${HOST_ADDRESS}\
        \ > /dev/null; do\n  echo \"Waiting for service to be available...\"\n  sleep\
        \ 5\ndone\nsource .venv/bin/activate && pytest -s --tb=short --level=${HTTP_API_TEST_LEVEL}\
        \ test/testcases/test_sdk_api\n"
    - name: Run frontend api tests against Elasticsearch
      run: "export http_proxy=\"\"; export https_proxy=\"\"; export no_proxy=\"\"\
        ; export HTTP_PROXY=\"\"; export HTTPS_PROXY=\"\"; export NO_PROXY=\"\"\n\
        until sudo docker exec ${RAGFLOW_CONTAINER} curl -s --connect-timeout 5 ${HOST_ADDRESS}\
        \ > /dev/null; do\n  echo \"Waiting for service to be available...\"\n  sleep\
        \ 5\ndone\nsource .venv/bin/activate && pytest -s --tb=short sdk/python/test/test_frontend_api/get_email.py\
        \ sdk/python/test/test_frontend_api/test_dataset.py\n"
    - name: Run http api tests against Elasticsearch
      run: "export http_proxy=\"\"; export https_proxy=\"\"; export no_proxy=\"\"\
        ; export HTTP_PROXY=\"\"; export HTTPS_PROXY=\"\"; export NO_PROXY=\"\"\n\
        until sudo docker exec ${RAGFLOW_CONTAINER} curl -s --connect-timeout 5 ${HOST_ADDRESS}\
        \ > /dev/null; do\n  echo \"Waiting for service to be available...\"\n  sleep\
        \ 5\ndone\nsource .venv/bin/activate && pytest -s --tb=short --level=${HTTP_API_TEST_LEVEL}\
        \ test/testcases/test_http_api\n"
    - name: Stop ragflow:nightly
      if: always()
      run: 'sudo docker compose -f docker/docker-compose.yml -p ${GITHUB_RUN_ID} down
        -v || true

        sudo docker ps -a --filter "label=com.docker.compose.project=${GITHUB_RUN_ID}"
        -q | xargs -r sudo docker rm -f

        '
    - name: Start ragflow:nightly
      run: 'sed -i ''1i DOC_ENGINE=infinity'' docker/.env

        sudo docker compose -f docker/docker-compose.yml -p ${GITHUB_RUN_ID} up -d

        '
    - name: Run sdk tests against Infinity
      run: "export http_proxy=\"\"; export https_proxy=\"\"; export no_proxy=\"\"\
        ; export HTTP_PROXY=\"\"; export HTTPS_PROXY=\"\"; export NO_PROXY=\"\"\n\
        until sudo docker exec ${RAGFLOW_CONTAINER} curl -s --connect-timeout 5 ${HOST_ADDRESS}\
        \ > /dev/null; do\n  echo \"Waiting for service to be available...\"\n  sleep\
        \ 5\ndone\nsource .venv/bin/activate && DOC_ENGINE=infinity pytest -s --tb=short\
        \ --level=${HTTP_API_TEST_LEVEL} test/testcases/test_sdk_api\n"
    - name: Run frontend api tests against Infinity
      run: "export http_proxy=\"\"; export https_proxy=\"\"; export no_proxy=\"\"\
        ; export HTTP_PROXY=\"\"; export HTTPS_PROXY=\"\"; export NO_PROXY=\"\"\n\
        until sudo docker exec ${RAGFLOW_CONTAINER} curl -s --connect-timeout 5 ${HOST_ADDRESS}\
        \ > /dev/null; do\n  echo \"Waiting for service to be available...\"\n  sleep\
        \ 5\ndone\nsource .venv/bin/activate && DOC_ENGINE=infinity pytest -s --tb=short\
        \ sdk/python/test/test_frontend_api/get_email.py sdk/python/test/test_frontend_api/test_dataset.py\n"
    - name: Run http api tests against Infinity
      run: "export http_proxy=\"\"; export https_proxy=\"\"; export no_proxy=\"\"\
        ; export HTTP_PROXY=\"\"; export HTTPS_PROXY=\"\"; export NO_PROXY=\"\"\n\
        until sudo docker exec ${RAGFLOW_CONTAINER} curl -s --connect-timeout 5 ${HOST_ADDRESS}\
        \ > /dev/null; do\n  echo \"Waiting for service to be available...\"\n  sleep\
        \ 5\ndone\nsource .venv/bin/activate && DOC_ENGINE=infinity pytest -s --tb=short\
        \ --level=${HTTP_API_TEST_LEVEL} test/testcases/test_http_api\n"
    - name: Stop ragflow:nightly
      if: always()
      run: "# Sometimes `docker compose down` fail due to hang container, heavy load\
        \ etc. Need to remove such containers to release resources(for example, listen\
        \ ports).\nsudo docker compose -f docker/docker-compose.yml -p ${GITHUB_RUN_ID}\
        \ down -v || true\nsudo docker ps -a --filter \"label=com.docker.compose.project=${GITHUB_RUN_ID}\"\
        \ -q | xargs -r sudo docker rm -f\nif [[ -n ${RAGFLOW_IMAGE} ]]; then\n  sudo\
        \ docker rmi -f ${RAGFLOW_IMAGE}\nfi\n"
